<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarOnSale KICK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1d24;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    #gameWrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    canvas {
      display: block;
      width: 700px;
      height: 400px;
      max-width: 100vw;
      max-height: calc(100dvh - 140px);
      image-rendering: pixelated;
      border: 2px solid #FFD452;
      box-shadow: 0 0 40px rgba(255, 212, 82, 0.25), 0 0 80px rgba(255, 212, 82, 0.08);
    }

    /* ── Buttons ─────────────────────────── */
    #startButton {
      background: #FFD452;
      color: #2F343E;
      border: none;
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      padding: 14px 36px;
      cursor: pointer;
      box-shadow: 4px 4px 0 #b8951a;
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 1px;
    }
    #startButton:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #b8951a; }
    #startButton:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #b8951a; }

    #buttonRow {
      display: none;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #buttonRow button {
      background: transparent;
      color: #FFD452;
      border: 2px solid #FFD452;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 10px 20px;
      cursor: pointer;
      box-shadow: 3px 3px 0 #b8951a;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #buttonRow button:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 #b8951a; }
    #buttonRow button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #b8951a; }

    /* ── Touch Controls ──────────────────── */
    #touchControls {
      display: none;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 700px;
      padding: 0 8px;
      margin-top: 4px;
    }

    #touchLeft, #touchRight {
      display: flex;
      gap: 8px;
    }

    #touchCenter {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }

    .tBtn {
      background: rgba(255, 212, 82, 0.12);
      border: 2px solid #FFD452;
      color: #FFD452;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      width: 52px; height: 52px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 3px 3px 0 #b8951a;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      transition: background 0.08s;
    }
    .tBtn.tactive, .tBtn:active {
      background: rgba(255, 212, 82, 0.35);
    }

    .tBtnWide {
      width: 110px;
      font-size: 8px;
      letter-spacing: 1px;
    }

    @media (pointer: coarse) {
      #touchControls { display: flex; }
      canvas { max-height: calc(100dvh - 200px); }
    }

    @media (max-width: 720px) {
      canvas { width: 100vw; height: calc(100vw * 0.571); }
    }
  </style>
</head>
<body>
  <div id="gameWrapper">
    <canvas id="gameCanvas" width="700" height="400"></canvas>

    <button id="startButton">KICK OFF ▶</button>

    <div id="buttonRow">
      <button id="btnRestart">↺ PLAY AGAIN</button>
    </div>

    <!-- Touch Controls -->
    <div id="touchControls">
      <div id="touchLeft">
        <div class="tBtn" data-key="ArrowLeft">◀</div>
        <div class="tBtn" data-key="ArrowRight">▶</div>
      </div>

      <div id="touchCenter">
        <div class="tBtn tBtnWide" data-key="ArrowUp">↑ POWER</div>
        <div class="tBtn tBtnWide" data-key="Space">SHOOT</div>
        <div class="tBtn tBtnWide" data-key="ArrowDown">CHIP ↗</div>
      </div>
    </div>
  </div>

  <script src="soccer.js"></script>
</body>
</html>
